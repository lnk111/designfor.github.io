<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인포 — 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">

<!-- Firebase SDK compat v9 (window 전역, CDN 안정 버전) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --gold:   #B59155;
  --gold-lt:#CDA96E;
  --dark:   #1A1A17;
  --dark2:  #252520;
  --stone:  #68665E;
  --border: rgba(26,26,23,0.12);
  --cream:  #F5F1EA;
  --bg:     #F2F1EE;
  --ff:     'Noto Sans KR', sans-serif;
  --serif:  'Cormorant Garamond', Georgia, serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--ff); font-weight:300; background:var(--bg); color:var(--dark); min-height:100vh; }
button { font-family:var(--ff); cursor:pointer; }
a { text-decoration:none; }

/* ── 로그인 ── */
#login-screen {
  position:fixed; inset:0; z-index:9999; background:var(--dark2);
  display:flex; align-items:center; justify-content:center;
}
.login-box { background:#fff; padding:52px 48px; width:100%; max-width:380px; text-align:center; border-radius:4px; }
.login-logo { font-family:var(--serif); font-size:22px; font-weight:400; letter-spacing:0.18em; color:var(--dark); margin-bottom:4px; }
.login-sub  { font-size:10px; color:#999; letter-spacing:0.22em; margin-bottom:36px; }
.login-pw {
  width:100%; border:1.5px solid #D4D2CB; border-radius:4px;
  padding:14px; font-size:18px; text-align:center; letter-spacing:0.4em;
  outline:none; margin-bottom:12px; background:#FAFAF8;
  transition:border-color 0.2s;
}
.login-pw:focus { border-color:var(--gold); }
.login-btn {
  width:100%; background:var(--dark); color:#F0EDE6; border:none;
  border-radius:4px; padding:14px; font-size:11px; font-weight:500;
  letter-spacing:0.24em; text-transform:uppercase; transition:background 0.3s;
}
.login-btn:hover { background:var(--gold); }
.login-err { font-size:12px; color:#C0392B; margin-top:10px; min-height:18px; }

/* ── 헤더 ── */
#admin-hdr {
  display:none; background:var(--dark); height:58px;
  align-items:center; justify-content:space-between;
  padding:0 40px; position:sticky; top:0; z-index:100;
}
.hdr-brand { font-family:var(--serif); font-size:17px; font-weight:400; letter-spacing:0.16em; color:#fff; }
.hdr-brand small { font-size:9px; color:rgba(255,255,255,0.4); letter-spacing:0.22em; margin-left:10px; vertical-align:middle; }
.hdr-right { display:flex; align-items:center; gap:16px; }
.hdr-link { font-size:10px; letter-spacing:0.16em; color:rgba(255,255,255,0.55); border:1px solid rgba(255,255,255,0.2); padding:7px 14px; border-radius:4px; transition:color 0.2s, border-color 0.2s; }
.hdr-link:hover { color:#fff; border-color:rgba(255,255,255,0.6); }
.hdr-logout { font-size:10px; letter-spacing:0.14em; color:rgba(255,255,255,0.45); background:none; border:none; transition:color 0.2s; }
.hdr-logout:hover { color:#fff; }

/* ── 메인 ── */
#admin-main { display:none; max-width:1080px; margin:0 auto; padding:36px 40px 80px; }

/* ── 탭 ── */
.tabs { display:flex; gap:4px; background:#E6E4DF; border-radius:10px; padding:4px; width:fit-content; margin-bottom:28px; }
.tab {
  font-size:12px; letter-spacing:0.12em; font-weight:500;
  color:var(--stone); background:transparent; border:none;
  border-radius:7px; padding:10px 26px; transition:background 0.2s, color 0.2s;
  text-transform:uppercase; position:relative;
}
.tab:hover { color:var(--dark); background:rgba(255,255,255,0.5); }
.tab.on { background:#fff; color:var(--dark); box-shadow:0 1px 5px rgba(0,0,0,0.10); }
.tab-cnt {
  display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px; border-radius:50%;
  background:var(--gold); color:#fff;
  font-size:9px; font-weight:700; margin-left:6px; vertical-align:middle;
}

/* ── 패널 헤더 ── */
.panel-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.panel-title { font-family:var(--serif); font-size:22px; font-weight:300; }
.btn-new {
  display:inline-flex; align-items:center; gap:8px;
  font-size:11px; letter-spacing:0.16em; font-weight:500;
  color:#fff; background:var(--gold); border:none;
  padding:11px 20px; border-radius:4px; transition:background 0.3s;
}
.btn-new:hover { background:var(--gold-lt); }
.btn-new svg { width:13px; height:13px; stroke:#fff; fill:none; stroke-width:2; }

/* ── 포트폴리오 그리드 ── */
.port-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
.port-card { background:#fff; border:1px solid #DDD9D0; border-radius:8px; overflow:hidden; transition:box-shadow 0.25s; }
.port-card:hover { box-shadow:0 5px 24px rgba(0,0,0,0.09); }
.port-thumb { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#F0EEE9; }
.port-nothumb { width:100%; aspect-ratio:4/3; background:#F0EEE9; display:flex; align-items:center; justify-content:center; font-size:12px; color:#999; }
.port-body { padding:14px 16px 16px; }
.port-name { font-size:14px; font-weight:500; color:var(--dark); margin-bottom:3px; }
.port-meta { font-size:11px; color:#999; line-height:1.7; margin-bottom:12px; }
.port-actions { display:flex; gap:8px; }
.btn-edit { flex:1; font-size:10px; letter-spacing:0.12em; padding:8px; color:var(--stone); border:1px solid #D4D2CB; background:#FAFAF8; border-radius:4px; transition:background 0.2s, color 0.2s; }
.btn-edit:hover { background:var(--dark); color:#fff; border-color:var(--dark); }
.btn-del  { flex:1; font-size:10px; letter-spacing:0.12em; padding:8px; color:#C0392B; border:1px solid rgba(192,57,43,0.25); background:#fff; border-radius:4px; transition:background 0.2s; }
.btn-del:hover { background:#C0392B; color:#fff; border-color:#C0392B; }

/* ── 요약 ── */
.inq-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.stat-box { background:#fff; border:1px solid #DDD9D0; border-radius:8px; padding:16px 20px; }
.stat-label { font-size:10px; letter-spacing:0.16em; color:var(--stone); text-transform:uppercase; margin-bottom:4px; }
.stat-num { font-family:var(--serif); font-size:34px; font-weight:300; color:var(--dark); line-height:1; }
.stat-box.hl .stat-num { color:var(--gold); }

/* ── 문의 카드 ── */
.inq-list { display:flex; flex-direction:column; gap:12px; }
.inq-card { background:#fff; border:1px solid #DDD9D0; border-radius:8px; overflow:hidden; }
.inq-card.is-new { border-left:4px solid var(--gold); }

.inq-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; background:#FAFAF8; border-bottom:1px solid #ECEAE5;
  gap:10px; flex-wrap:wrap;
}
.inq-head-l { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.inq-name-txt { font-size:16px; font-weight:600; color:var(--dark); }
.badge-new  { font-size:10px; font-weight:700; color:#fff; background:var(--gold); padding:3px 9px; border-radius:20px; letter-spacing:0.08em; }
.badge-done { font-size:10px; color:#999; background:#F0EEE9; padding:3px 9px; border-radius:20px; }
.badge-type { font-size:11px; color:#3D3B35; background:#F0EEE9; border:1px solid #DDD9D0; padding:3px 9px; border-radius:4px; }
.inq-date-txt { font-size:11px; color:#999; white-space:nowrap; }

.inq-body { padding:18px 20px; }

.inq-contact { display:flex; align-items:center; gap:18px; flex-wrap:wrap; padding-bottom:14px; border-bottom:1px solid #ECEAE5; margin-bottom:14px; }
.contact-item { display:flex; align-items:center; gap:7px; }
.contact-ico { width:14px; height:14px; stroke:#AAA; fill:none; stroke-width:1.5; flex-shrink:0; }
.contact-tel { font-size:15px; font-weight:600; color:var(--dark); }
.contact-email { font-size:13px; color:var(--stone); }

.inq-addr-box { display:flex; align-items:flex-start; gap:7px; padding:10px 14px; background:#F7F6F3; border-radius:6px; margin-bottom:14px; }
.addr-ico { width:13px; height:13px; stroke:#AAA; fill:none; stroke-width:1.5; flex-shrink:0; margin-top:2px; }
.addr-txt { font-size:13px; color:var(--dark); line-height:1.6; }

.inq-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px 28px; margin-bottom:14px; }
.inq-field-label { font-size:10px; letter-spacing:0.14em; font-weight:600; color:var(--stone); text-transform:uppercase; margin-bottom:3px; }
.inq-field-val { font-size:13px; color:var(--dark); line-height:1.6; }
.inq-field-val.empty { color:#BBB; font-style:italic; }
.tags { display:flex; flex-wrap:wrap; gap:5px; }
.tag { font-size:11px; font-weight:500; color:#3D3B35; background:#F0EEE9; border:1px solid #DDD9D0; padding:3px 9px; border-radius:4px; }
.tag.gold { background:#FFF4E0; border-color:#E8D9BC; color:#8A6830; }

.inq-msg-box { padding:12px 14px; background:#F7F6F3; border:1px solid #ECEAE5; border-radius:6px; margin-bottom:14px; }
.inq-msg-label { font-size:10px; letter-spacing:0.14em; font-weight:600; color:var(--stone); text-transform:uppercase; margin-bottom:5px; }
.inq-msg-txt { font-size:13px; color:var(--dark); line-height:1.7; }

.inq-actions { display:flex; gap:8px; justify-content:flex-end; padding-top:12px; border-top:1px solid #ECEAE5; }
.btn-read { font-size:11px; font-weight:500; letter-spacing:0.08em; padding:8px 16px; color:var(--dark); border:1.5px solid #C8C6BF; background:#fff; border-radius:4px; transition:background 0.2s; }
.btn-read:hover { background:var(--dark); color:#fff; border-color:var(--dark); }
.btn-del-inq { font-size:11px; font-weight:500; letter-spacing:0.08em; padding:8px 16px; color:#C0392B; border:1.5px solid rgba(192,57,43,0.3); background:#fff; border-radius:4px; transition:background 0.2s; }
.btn-del-inq:hover { background:#C0392B; color:#fff; border-color:#C0392B; }

/* ── 빈 상태 ── */
.empty { padding:70px 0; text-align:center; color:#BBB; font-size:13px; line-height:2.4; }
.empty svg { display:block; margin:0 auto 14px; width:38px; height:38px; stroke:#DDD; fill:none; stroke-width:1; }

/* ── 모달 ── */
.modal-bg { position:fixed; inset:0; z-index:900; background:rgba(26,26,23,0.6); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; padding:20px; }
.modal-bg.open { opacity:1; pointer-events:all; }
.modal-box { background:#fff; width:100%; max-width:660px; max-height:90vh; overflow-y:auto; padding:40px 44px; border-radius:8px; transform:translateY(16px); transition:transform 0.3s; }
.modal-bg.open .modal-box { transform:translateY(0); }
.modal-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
.modal-ttl { font-family:var(--serif); font-size:21px; font-weight:300; }
.modal-cls { background:none; border:none; width:30px; height:30px; display:flex; align-items:center; justify-content:center; color:var(--stone); border-radius:4px; }
.modal-cls:hover { background:#F0EEE9; }
.modal-cls svg { width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:1.5; }
.mf-row2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }
.mf-row2.full { grid-template-columns:1fr; }
.mf-lbl { display:block; font-size:11px; font-weight:600; color:#2A2A26; margin-bottom:6px; }
.mf-inp, .mf-sel { width:100%; background:#FDFCFA; border:1.5px solid #C8C6BF; border-radius:4px; padding:10px 13px; font-family:var(--ff); font-size:13px; color:var(--dark); outline:none; transition:border-color 0.2s, box-shadow 0.2s; }
.mf-inp:focus, .mf-sel:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(181,145,85,0.12); }
.mf-sel option { background:#fff; }
.upload-zone { border:2px dashed #D4D2CB; border-radius:6px; padding:24px; text-align:center; cursor:pointer; transition:border-color 0.3s, background 0.3s; background:#FAFAF8; }
.upload-zone:hover { border-color:var(--gold); background:#FFF8EE; }
.upload-zone input { display:none; }
.upload-txt { font-size:13px; color:var(--stone); line-height:1.8; }
.upload-txt strong { color:var(--gold); font-weight:500; }
.prog-wrap { display:none; margin-top:10px; }
.prog-wrap.show { display:block; }
.prog-bg { background:#ECEAE5; height:4px; border-radius:2px; overflow:hidden; margin-bottom:5px; }
.prog-bar { height:100%; background:var(--gold); width:0%; transition:width 0.3s; }
.prog-txt { font-size:11px; color:var(--stone); }
.prev-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(85px,1fr)); gap:7px; margin-top:10px; }
.prev-item { position:relative; aspect-ratio:1; overflow:hidden; border:2px solid transparent; border-radius:4px; cursor:pointer; transition:border-color 0.2s; }
.prev-item.cover { border-color:var(--gold); }
.prev-item img { width:100%; height:100%; object-fit:cover; display:block; }
.prev-del { position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,0.65); border:none; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; }
.prev-item:hover .prev-del { opacity:1; }
.prev-del svg { width:10px; height:10px; stroke:#fff; fill:none; stroke-width:2; }
.prev-badge { position:absolute; bottom:0; left:0; right:0; background:var(--gold); color:#fff; font-size:8px; text-align:center; padding:2px; }
.cover-hint { font-size:10px; color:#999; margin-top:6px; }
.modal-acts { display:flex; gap:10px; margin-top:28px; }
.btn-save { flex:1; background:var(--gold); color:#fff; border:none; border-radius:4px; padding:13px; font-size:11px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; transition:background 0.3s; }
.btn-save:hover { background:var(--gold-lt); }
.btn-save:disabled { background:#C8C6BF; cursor:not-allowed; }
.btn-cancel { flex:1; background:transparent; color:var(--stone); border:1.5px solid #D4D2CB; border-radius:4px; padding:13px; font-size:11px; letter-spacing:0.14em; transition:background 0.3s, color 0.3s; }
.btn-cancel:hover { background:var(--dark); color:#fff; border-color:var(--dark); }

/* ── 토스트 ── */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(12px); background:var(--dark); color:#F0EDE6; font-size:13px; padding:12px 24px; border-radius:4px; z-index:9999; opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (max-width:680px) {
  #admin-main { padding:24px 16px 60px; }
  #admin-hdr { padding:0 16px; }
  .tabs { width:100%; }
  .tab { flex:1; padding:10px 10px; font-size:10px; }
  .inq-grid { grid-template-columns:1fr; }
  .inq-stats { grid-template-columns:1fr 1fr; }
  .mf-row2 { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">DESIGN FOR</div>
    <div class="login-sub">ADMIN DASHBOARD</div>
    <input class="login-pw" type="password" id="pw-input" placeholder="••••" maxlength="10"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 헤더 -->
<div id="admin-hdr">
  <div class="hdr-brand">DESIGN FOR <small>ADMIN</small></div>
  <div class="hdr-right">
    <a href="/" class="hdr-link" target="_blank">홈페이지 보기</a>
    <button class="hdr-logout" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<!-- 메인 -->
<div id="admin-main">
  <div class="tabs">
    <button class="tab on" id="tab-port" onclick="switchTab('portfolio')">포트폴리오</button>
    <button class="tab" id="tab-inq" onclick="switchTab('inquiries')">
      상담 문의 <span class="tab-cnt" id="inq-cnt" style="display:none">0</span>
    </button>
  </div>

  <!-- 포트폴리오 패널 -->
  <div id="panel-port">
    <div class="panel-hdr">
      <div class="panel-title">포트폴리오 관리</div>
      <button class="btn-new" onclick="openModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        새 현장 등록
      </button>
    </div>
    <div class="port-grid" id="port-grid">
      <div class="empty" style="grid-column:1/-1">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Firebase 연결 중...
      </div>
    </div>
  </div>

  <!-- 문의 패널 -->
  <div id="panel-inq" style="display:none">
    <div class="panel-hdr">
      <div class="panel-title">상담 문의 내역</div>
    </div>
    <div class="inq-stats" id="inq-stats"></div>
    <div class="inq-list" id="inq-list">
      <div class="empty">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Firebase 연결 중...
      </div>
    </div>
  </div>
</div>

<!-- 현장 등록/수정 모달 -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this) closeModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-ttl" id="modal-ttl">현장 등록</div>
      <button class="modal-cls" onclick="closeModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="mf-row2">
      <div><label class="mf-lbl">현장명 *</label><input id="mf-name" class="mf-inp" type="text" placeholder="예) 수원 망포동 아파트"></div>
      <div><label class="mf-lbl">유형 *</label>
        <select id="mf-type" class="mf-sel">
          <option value="">선택</option>
          <option value="20PY">20PY</option>
          <option value="30PY">30PY</option>
          <option value="40PY">40PY 이상</option>
        </select>
      </div>
    </div>
    <div class="mf-row2">
      <div><label class="mf-lbl">위치</label><input id="mf-loc" class="mf-inp" type="text" placeholder="예) 경기도 수원시"></div>
      <div><label class="mf-lbl">면적</label><input id="mf-area" class="mf-inp" type="text" placeholder="예) 32평 (106㎡)"></div>
    </div>
    <div class="mf-row2 full" style="margin-bottom:18px">
      <div><label class="mf-lbl">시공 기간</label><input id="mf-period" class="mf-inp" type="text" placeholder="예) 2024.03 — 2024.05"></div>
    </div>
    <div style="margin-bottom:20px">
      <label class="mf-lbl">사진 업로드 *</label>
      <label class="upload-zone">
        <input type="file" id="mf-files" accept="image/*" multiple onchange="handleFiles(this.files)">
        <div class="upload-txt"><strong>클릭하여 사진 선택</strong> 또는 드래그 앤 드롭<br>JPG · PNG · WEBP — 최대 10MB</div>
      </label>
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-bg"><div class="prog-bar" id="prog-bar"></div></div>
        <div class="prog-txt" id="prog-txt"></div>
      </div>
      <div class="prev-grid" id="prev-grid"></div>
      <p class="cover-hint" id="cover-hint" style="display:none">※ 사진 클릭 시 대표 이미지로 설정</p>
    </div>
    <div class="modal-acts">
      <button class="btn-save" id="btn-save" onclick="saveProject()">저장하기</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════════
   Firebase 설정 (compat SDK — window 전역)
   ════════════════════════════════ */
var FB_CONFIG = {
  apiKey:            "AIzaSyC0LNwrtehJ8BytnXL5-aiG2H_sTIgXgk4",
  authDomain:        "designfor-ef0ed.firebaseapp.com",
  projectId:         "designfor-ef0ed",
  storageBucket:     "designfor-ef0ed.firebasestorage.app",
  messagingSenderId: "284384518635",
  appId:             "1:284384518635:web:62f4a1ce63e90ca7b2f9ae"
};
firebase.initializeApp(FB_CONFIG);
var db = firebase.firestore();

/* Cloudinary */
var CLD = { cloud:'dirocerek', preset:'designfor_upload', folder:'designfor_portfolio' };

/* 비밀번호 */
var ADMIN_PW = '1212';

/* ════════════════════════════════
   유틸
   ════════════════════════════════ */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function toast(msg, dur) {
  dur = dur || 2400;
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, dur);
}
function fmt(ts) {
  var d = new Date(ts);
  return d.getFullYear() + '.' +
    String(d.getMonth()+1).padStart(2,'0') + '.' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0');
}

/* ════════════════════════════════
   로그인 / 로그아웃
   ════════════════════════════════ */
function doLogin() {
  var pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-hdr').style.display   = 'flex';
    document.getElementById('admin-main').style.display  = 'block';
    document.getElementById('pw-input').value = '';
    startListeners();
  } else {
    document.getElementById('login-err').textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value = '';
    setTimeout(function(){ document.getElementById('login-err').textContent = ''; }, 2500);
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-hdr').style.display   = 'none';
  document.getElementById('admin-main').style.display  = 'none';
}

/* ════════════════════════════════
   탭 전환
   ════════════════════════════════ */
var curTab = 'portfolio';
function switchTab(tab) {
  curTab = tab;
  var isPort = tab === 'portfolio';
  document.getElementById('tab-port').classList.toggle('on', isPort);
  document.getElementById('tab-inq').classList.toggle('on', !isPort);
  document.getElementById('panel-port').style.display = isPort ? '' : 'none';
  document.getElementById('panel-inq').style.display  = isPort ? 'none' : '';
  if (!isPort) renderInqList();
}

/* ════════════════════════════════
   Firebase 리스너 (로그인 후 1회 실행)
   ════════════════════════════════ */
var projectsCache   = [];
var inquiriesCache  = [];
var listenersStarted = false;

function startListeners() {
  if (listenersStarted) return;
  listenersStarted = true;

  /* 포트폴리오 */
  db.collection('projects').orderBy('createdAt','asc')
    .onSnapshot(function(snap) {
      projectsCache = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
      renderPortGrid();
    }, function(e){ console.error('projects:', e); });

  /* 상담 문의 */
  db.collection('inquiries').orderBy('createdAt','desc')
    .onSnapshot(function(snap) {
      inquiriesCache = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
      var newCnt = inquiriesCache.filter(function(i){ return i.isNew; }).length;
      var cntEl = document.getElementById('inq-cnt');
      cntEl.style.display = newCnt > 0 ? '' : 'none';
      cntEl.textContent   = newCnt;
      if (curTab === 'inquiries') renderInqList();
    }, function(e){ console.error('inquiries:', e); });
}

/* ════════════════════════════════
   포트폴리오 렌더
   ════════════════════════════════ */
function renderPortGrid() {
  var grid = document.getElementById('port-grid');
  if (!projectsCache.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">' +
      '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/>' +
      '<circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
      '등록된 현장이 없습니다.</div>';
    return;
  }
  grid.innerHTML = projectsCache.map(function(p) {
    var thumb = p.coverImage
      ? '<img class="port-thumb" src="' + p.coverImage + '" alt="' + esc(p.siteName) + '">'
      : '<div class="port-nothumb">이미지 없음</div>';
    return '<div class="port-card">' + thumb +
      '<div class="port-body">' +
        '<div class="port-name">' + esc(p.siteName) + '</div>' +
        '<div class="port-meta">' + esc(p.type||'') + (p.area?' · '+esc(p.area):'') + (p.location?'<br>'+esc(p.location):'') + '</div>' +
        '<div class="port-actions">' +
          '<button class="btn-edit" onclick="editProject(\'' + p.id + '\')">수정</button>' +
          '<button class="btn-del"  onclick="delProject(\'' + p.id + '\')">삭제</button>' +
        '</div>' +
      '</div></div>';
  }).join('');
}

/* ════════════════════════════════
   문의 렌더
   ════════════════════════════════ */
function renderInqList() {
  var stats = document.getElementById('inq-stats');
  var list  = document.getElementById('inq-list');
  var total    = inquiriesCache.length;
  var newCnt   = inquiriesCache.filter(function(i){ return i.isNew; }).length;
  var today    = new Date();
  var todayCnt = inquiriesCache.filter(function(i){
    var d = new Date(i.createdAt);
    return d.getFullYear()===today.getFullYear() && d.getMonth()===today.getMonth() && d.getDate()===today.getDate();
  }).length;

  stats.innerHTML =
    '<div class="stat-box hl"><div class="stat-label">미확인 문의</div><div class="stat-num">' + newCnt + '</div></div>' +
    '<div class="stat-box"><div class="stat-label">오늘 접수</div><div class="stat-num">' + todayCnt + '</div></div>' +
    '<div class="stat-box"><div class="stat-label">전체 문의</div><div class="stat-num">' + total + '</div></div>';

  if (!total) {
    list.innerHTML = '<div class="empty">' +
      '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
      '아직 접수된 상담 문의가 없습니다.<br>' +
      '<span style="font-size:12px;color:#BBB;">고객이 상담을 신청하면 여기 표시됩니다.</span></div>';
    return;
  }

  var phoneIco = '<svg class="contact-ico" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.36 2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2z"/></svg>';
  var mailIco  = '<svg class="contact-ico" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>';
  var pinIco   = '<svg class="addr-ico" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';

  list.innerHTML = inquiriesCache.map(function(inq) {
    var space = [
      inq.pyeong && inq.pyeong + '평',
      inq.room   && inq.room + '방',
      inq.bath   && inq.bath + '욕실'
    ].filter(Boolean).join(' · ');

    var inflowTags = inq.inflow
      ? inq.inflow.split(',').map(function(s){ return '<span class="tag">' + esc(s.trim()) + '</span>'; }).join('')
      : '';

    return '<div class="inq-card' + (inq.isNew ? ' is-new' : '') + '">' +

      '<div class="inq-head">' +
        '<div class="inq-head-l">' +
          '<span class="inq-name-txt">' + esc(inq.name) + '</span>' +
          (inq.isNew ? '<span class="badge-new">NEW</span>' : '<span class="badge-done">확인완료</span>') +
          (inq.spaceType ? '<span class="badge-type">' + esc(inq.spaceType) + '</span>' : '') +
        '</div>' +
        '<span class="inq-date-txt">' + fmt(inq.createdAt) + '</span>' +
      '</div>' +

      '<div class="inq-body">' +

        '<div class="inq-contact">' +
          '<div class="contact-item">' + phoneIco + '<span class="contact-tel">' + esc(inq.tel) + '</span></div>' +
          (inq.email ? '<div class="contact-item">' + mailIco + '<span class="contact-email">' + esc(inq.email) + '</span></div>' : '') +
        '</div>' +

        (inq.addr ? '<div class="inq-addr-box">' + pinIco + '<span class="addr-txt">' + esc(inq.addr) + '</span></div>' : '') +

        '<div class="inq-grid">' +
          '<div><div class="inq-field-label">공간구성</div><div class="inq-field-val' + (space?'':' empty') + '">' + (space||'미입력') + '</div></div>' +
          '<div><div class="inq-field-label">공사예산</div><div class="inq-field-val' + (inq.budget?'':' empty') + '">' + (inq.budget?'<span class="tag gold">'+esc(inq.budget)+'</span>':'미선택') + '</div></div>' +
          '<div><div class="inq-field-label">공사 시작일</div><div class="inq-field-val' + (inq.startDate?'':' empty') + '">' + (esc(inq.startDate)||'미입력') + '</div></div>' +
          '<div><div class="inq-field-label">입주 예정일</div><div class="inq-field-val' + (inq.moveIn?'':' empty') + '">' + (esc(inq.moveIn)||'미입력') + '</div></div>' +
          (inflowTags ? '<div style="grid-column:1/-1"><div class="inq-field-label">유입경로</div><div class="inq-field-val"><div class="tags">' + inflowTags + '</div></div></div>' : '') +
        '</div>' +

        (inq.msg ? '<div class="inq-msg-box"><div class="inq-msg-label">문의사항</div><div class="inq-msg-txt">' + esc(inq.msg) + '</div></div>' : '') +

        '<div class="inq-actions">' +
          (inq.isNew ? '<button class="btn-read" onclick="markRead(\'' + inq.id + '\')">확인 처리</button>' : '') +
          '<button class="btn-del-inq" onclick="delInq(\'' + inq.id + '\')">삭제</button>' +
        '</div>' +

      '</div></div>';
  }).join('');
}

/* ════════════════════════════════
   문의 확인 / 삭제
   ════════════════════════════════ */
function markRead(id) {
  db.collection('inquiries').doc(id).update({ isNew: false })
    .catch(function(e){ toast('오류: ' + e.message); });
}
function delInq(id) {
  if (!confirm('이 문의를 삭제하시겠습니까?')) return;
  db.collection('inquiries').doc(id).delete()
    .then(function(){ toast('삭제됐습니다.'); })
    .catch(function(e){ toast('오류: ' + e.message); });
}

/* ════════════════════════════════
   포트폴리오 CRUD
   ════════════════════════════════ */
function editProject(id) {
  var p = projectsCache.find(function(x){ return x.id === id; });
  if (!p) return;
  modalMode = 'edit'; editId = id; pendingImgs = []; coverIdx = 0;
  document.getElementById('mf-name').value   = p.siteName || '';
  document.getElementById('mf-type').value   = p.type     || '';
  document.getElementById('mf-loc').value    = p.location || '';
  document.getElementById('mf-area').value   = p.area     || '';
  document.getElementById('mf-period').value = p.period   || '';
  var imgs = [];
  if (p.coverImage) imgs.push(p.coverImage);
  if (p.images) p.images.forEach(function(i){ if (i !== p.coverImage) imgs.push(i); });
  imgs.forEach(function(url){ pendingImgs.push({ url: url, file: null }); });
  renderPrev();
  document.getElementById('modal-ttl').textContent = '현장 수정';
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function delProject(id) {
  if (!confirm('이 현장을 삭제하시겠습니까?')) return;
  db.collection('projects').doc(id).delete()
    .then(function(){ toast('삭제됐습니다.'); })
    .catch(function(e){ toast('오류: ' + e.message); });
}

/* ════════════════════════════════
   모달
   ════════════════════════════════ */
var modalMode = 'add', editId = null, pendingImgs = [], coverIdx = 0;

function openModal() {
  modalMode = 'add'; editId = null; pendingImgs = []; coverIdx = 0;
  document.getElementById('mf-name').value   = '';
  document.getElementById('mf-type').value   = '';
  document.getElementById('mf-loc').value    = '';
  document.getElementById('mf-area').value   = '';
  document.getElementById('mf-period').value = '';
  document.getElementById('mf-files').value  = '';
  setProgress(false, 0, ''); renderPrev();
  document.getElementById('modal-ttl').textContent = '현장 등록';
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

/* 파일 선택 */
function handleFiles(files) {
  var MAX = 10 * 1024 * 1024;
  Array.from(files).forEach(function(f) {
    if (f.size > MAX) { toast(f.name + ' — 10MB 초과'); return; }
    var r = new FileReader();
    r.onload = function(e) { pendingImgs.push({ url: e.target.result, file: f }); renderPrev(); };
    r.readAsDataURL(f);
  });
  document.getElementById('mf-files').value = '';
}

function renderPrev() {
  var grid = document.getElementById('prev-grid');
  var hint = document.getElementById('cover-hint');
  if (!pendingImgs.length) { grid.innerHTML = ''; hint.style.display = 'none'; return; }
  hint.style.display = 'block';
  grid.innerHTML = pendingImgs.map(function(img, i) {
    return '<div class="prev-item' + (i===coverIdx?' cover':'') + '" onclick="setCover(' + i + ')">' +
      '<img src="' + img.url + '" alt="">' +
      (i===coverIdx ? '<div class="prev-badge">대표</div>' : '') +
      '<button class="prev-del" onclick="removeImg(event,' + i + ')">' +
        '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
      '</button></div>';
  }).join('');
}
function setCover(i) { coverIdx = i; renderPrev(); }
function removeImg(e, i) {
  e.stopPropagation();
  pendingImgs.splice(i, 1);
  if (coverIdx >= pendingImgs.length) coverIdx = Math.max(0, pendingImgs.length - 1);
  renderPrev();
}

function setProgress(show, pct, txt) {
  document.getElementById('prog-wrap').classList.toggle('show', show);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = txt;
}

/* Cloudinary 압축 + 업로드 */
function compress(file, maxPx, q) {
  return new Promise(function(res) {
    var img = new Image(), url = URL.createObjectURL(file);
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else       { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      var c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      c.toBlob(function(b){ res(b || file); }, 'image/jpeg', q);
    };
    img.onerror = function(){ URL.revokeObjectURL(url); res(file); };
    img.src = url;
  });
}
function uploadOne(file, onProg) {
  return compress(file, 1920, 0.82).then(function(blob) {
    return new Promise(function(res, rej) {
      var fd = new FormData();
      fd.append('file', blob);
      fd.append('upload_preset', CLD.preset);
      fd.append('folder', CLD.folder);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://api.cloudinary.com/v1_1/' + CLD.cloud + '/image/upload');
      xhr.upload.onprogress = function(e) { if (e.lengthComputable && onProg) onProg(Math.round(e.loaded/e.total*100)); };
      xhr.onload = function() { xhr.status===200 ? res(JSON.parse(xhr.responseText).secure_url) : rej(new Error('업로드 실패')); };
      xhr.onerror = function(){ rej(new Error('네트워크 오류')); };
      xhr.send(fd);
    });
  });
}

function saveProject() {
  var siteName = document.getElementById('mf-name').value.trim();
  var type     = document.getElementById('mf-type').value;
  var location = document.getElementById('mf-loc').value.trim();
  var area     = document.getElementById('mf-area').value.trim();
  var period   = document.getElementById('mf-period').value.trim();
  if (!siteName) { toast('현장명을 입력해 주세요.'); return; }
  if (!type)     { toast('유형을 선택해 주세요.'); return; }
  if (!pendingImgs.length) { toast('사진을 1장 이상 선택해 주세요.'); return; }

  var toUp = pendingImgs.filter(function(i){ return i.file; });
  var btn  = document.getElementById('btn-save');
  btn.disabled = true;

  var chain = Promise.resolve();
  var done = 0;
  if (toUp.length) {
    setProgress(true, 0, '0/' + toUp.length + ' 업로드 중...');
    toUp.forEach(function(img) {
      chain = chain.then(function() {
        return uploadOne(img.file, function(pct) {
          setProgress(true, Math.round((done + pct/100) / toUp.length * 100), (done+1) + '/' + toUp.length + ' 업로드 중... ' + pct + '%');
        }).then(function(url) {
          img.url = url; img.file = null; done++;
          setProgress(true, Math.round(done/toUp.length*100), done + '/' + toUp.length + ' 완료');
        });
      });
    });
  }

  chain.then(function() {
    var images     = pendingImgs.map(function(i){ return i.url; });
    var coverImage = images[coverIdx] || images[0];
    var data = { siteName:siteName, type:type, location:location, area:area, period:period, coverImage:coverImage, images:images };
    var p;
    if (modalMode === 'edit' && editId) {
      data.updatedAt = Date.now();
      p = db.collection('projects').doc(editId).update(data);
    } else {
      data.createdAt = Date.now();
      p = db.collection('projects').add(data);
    }
    return p;
  }).then(function() {
    toast(modalMode==='edit' ? '수정됐습니다.' : '등록됐습니다.');
    closeModal();
  }).catch(function(e) {
    toast('오류: ' + e.message, 3500);
  }).finally(function() {
    btn.disabled = false; setProgress(false, 0, '');
  });
}
</script>
