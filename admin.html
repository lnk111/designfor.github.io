<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인포 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F4F1; --surface: #FFFFFF; --dark: #1A1A17; --stone: #68665E;
  --stone-lt: #B0ADA5; --gold: #B59155; --gold-lt: #CDA96E;
  --border: rgba(26,26,23,0.10); --red: #C0392B; --green: #27AE60;
  --ff: 'Noto Sans KR', sans-serif; --serif: 'Cormorant Garamond', Georgia, serif; --radius: 12px;
}
html, body { min-height: 100%; font-family: var(--ff); font-weight: 300; background: var(--bg); color: var(--dark); }

/* LOGIN */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; }
.login-logo { font-family: var(--serif); font-size: 22px; font-weight: 400; letter-spacing: 0.14em; color: var(--dark); margin-bottom: 4px; }
.login-sub { font-size: 11px; letter-spacing: 0.22em; color: var(--stone-lt); margin-bottom: 36px; }
.login-label { display: block; font-size: 10px; letter-spacing: 0.24em; color: var(--stone); text-transform: uppercase; margin-bottom: 10px; }
.login-input { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; font-family: var(--ff); font-size: 14px; font-weight: 300; color: var(--dark); background: var(--bg); outline: none; transition: border-color 0.25s; margin-bottom: 12px; }
.login-input:focus { border-color: var(--gold); }
.login-error { font-size: 12px; color: var(--red); margin-bottom: 12px; min-height: 18px; }
.btn-login { width: 100%; background: var(--dark); color: #fff; border: none; border-radius: var(--radius); padding: 14px; font-family: var(--ff); font-size: 11px; font-weight: 400; letter-spacing: 0.24em; text-transform: uppercase; cursor: pointer; transition: background 0.25s; }
.btn-login:hover { background: #2E2E2A; }

/* ADMIN */
#admin-screen { display: none; min-height: 100vh; flex-direction: column; }
#admin-screen.show { display: flex; }
.adm-header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.adm-header-logo { font-family: var(--serif); font-size: 18px; font-weight: 400; letter-spacing: 0.14em; color: var(--dark); }
.adm-header-logo span { font-family: var(--ff); font-size: 10px; letter-spacing: 0.22em; color: var(--stone-lt); margin-left: 12px; }
.btn-logout { font-size: 10px; letter-spacing: 0.18em; color: var(--stone); background: none; border: 1px solid var(--border); border-radius: 8px; padding: 7px 16px; cursor: pointer; transition: all 0.25s; font-family: var(--ff); text-transform: uppercase; }
.btn-logout:hover { border-color: var(--dark); color: var(--dark); }

/* TABS */
.adm-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 32px; }
.adm-tab { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone-lt); padding: 14px 20px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--ff); }
.adm-tab.is-on { color: var(--dark); border-bottom-color: var(--gold); }

/* VIEWS */
.adm-view { display: none; }
.adm-view.is-on { display: block; }

/* ── PORTFOLIO VIEW ── */
.port-view { max-width: 1200px; margin: 0 auto; padding: 32px; }
.port-view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.port-view-title { font-family: var(--serif); font-size: 22px; font-weight: 300; letter-spacing: 0.1em; color: var(--dark); }
.btn-add-project { display: inline-flex; align-items: center; gap: 8px; background: var(--gold); color: var(--dark); border: none; border-radius: var(--radius); padding: 11px 20px; font-family: var(--ff); font-size: 10px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.25s; }
.btn-add-project:hover { background: var(--gold-lt); }
.btn-add-project svg { width: 14px; height: 14px; stroke: var(--dark); fill: none; stroke-width: 2; }

/* 현장 카드 목록 */
.project-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: border-color 0.25s; }
.project-card:hover { border-color: var(--stone-lt); }
.project-card__cover { aspect-ratio: 4/3; background: #EDEBE6; overflow: hidden; position: relative; }
.project-card__cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.project-card__cover-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--stone-lt); font-size: 11px; letter-spacing: 0.15em; }
.project-card__body { padding: 18px 20px; }
.project-card__name { font-family: var(--serif); font-size: 16px; font-weight: 400; color: var(--dark); letter-spacing: 0.04em; margin-bottom: 6px; }
.project-card__meta { font-size: 11px; color: var(--stone-lt); line-height: 1.7; }
.project-card__actions { padding: 0 20px 16px; display: flex; gap: 8px; }
.btn-edit { flex: 1; font-size: 10px; letter-spacing: 0.16em; color: var(--stone); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px; cursor: pointer; transition: all 0.2s; font-family: var(--ff); text-transform: uppercase; }
.btn-edit:hover { border-color: var(--gold); color: var(--gold); }
.btn-del-project { font-size: 10px; letter-spacing: 0.16em; color: var(--stone-lt); background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; cursor: pointer; transition: all 0.2s; font-family: var(--ff); }
.btn-del-project:hover { border-color: var(--red); color: var(--red); }

.empty-projects { padding: 80px 24px; text-align: center; color: var(--stone-lt); font-size: 13px; line-height: 2; }

/* ── 현장 등록/수정 MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--surface); border-radius: 20px; width: 100%; max-width: 680px; padding: 40px; position: relative; margin: auto; }
.modal-close { position: absolute; top: 20px; right: 24px; font-size: 22px; color: var(--stone-lt); background: none; border: none; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--dark); }
.modal-title { font-family: var(--serif); font-size: 22px; font-weight: 300; letter-spacing: 0.1em; color: var(--dark); margin-bottom: 32px; }

/* form */
.mf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.mf-group { margin-bottom: 20px; }
.mf-label { display: block; font-size: 10px; letter-spacing: 0.22em; color: var(--stone); text-transform: uppercase; margin-bottom: 8px; }
.mf-input, .mf-select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; font-family: var(--ff); font-size: 13px; font-weight: 300; color: var(--dark); background: var(--bg); outline: none; transition: border-color 0.25s; }
.mf-input:focus, .mf-select:focus { border-color: var(--gold); }

/* 섹션 구분 */
.mf-section { font-size: 10px; letter-spacing: 0.26em; color: var(--stone); text-transform: uppercase; margin: 28px 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

/* 이미지 드롭존 */
.drop-zone { border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: border-color 0.3s, background 0.3s; background: var(--bg); margin-bottom: 12px; position: relative; }
.drop-zone.drag-over { border-color: var(--gold); background: #FBF7F0; }
.drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop-zone__icon { width: 24px; height: 24px; stroke: var(--stone-lt); fill: none; stroke-width: 1.5; margin: 0 auto 8px; }
.drop-zone__text { font-size: 12px; color: var(--stone-lt); line-height: 1.6; }
.drop-zone__text strong { color: var(--gold); font-weight: 400; }

/* 미리보기 strip */
.preview-strip { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; min-height: 10px; }
.preview-thumb-wrap {
  position: relative; width: 86px; height: 86px;
  cursor: grab; user-select: none;
  transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
  border-radius: 10px;
}
.preview-thumb-wrap:active { cursor: grabbing; }
.preview-thumb-wrap.is-dragging {
  opacity: 0.45; transform: scale(0.94);
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  z-index: 100;
}
.preview-thumb-wrap.drag-over-target {
  transform: scale(1.06);
  box-shadow: 0 0 0 2px var(--gold);
}
.preview-thumb {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 10px; border: 1px solid var(--border); display: block;
  pointer-events: none;
}
/* 대표 뱃지 */
.preview-thumb-wrap.is-cover .preview-thumb { border-color: var(--gold); border-width: 2px; }
.preview-cover-badge {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--gold); color: var(--dark);
  font-size: 8px; letter-spacing: 0.12em; text-align: center;
  padding: 3px 0; border-radius: 0 0 9px 9px;
  font-family: var(--ff); font-weight: 400;
  pointer-events: none;
}
/* 순서 번호 */
.preview-order-num {
  position: absolute; top: 5px; left: 6px;
  background: rgba(0,0,0,0.52); color: #fff;
  font-size: 9px; letter-spacing: 0.06em;
  padding: 1px 5px; border-radius: 4px;
  pointer-events: none;
}
/* 삭제 버튼 */
.preview-remove {
  position: absolute; top: -6px; right: -6px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--red); color: #fff; border: none;
  cursor: pointer; font-size: 11px; line-height: 20px;
  text-align: center; padding: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  transition: transform 0.15s, background 0.15s;
  z-index: 10;
}
.preview-remove:hover { transform: scale(1.15); background: #E74C3C; }
/* 드래그 힌트 */
.preview-drag-hint {
  font-size: 10px; color: var(--stone-lt); letter-spacing: 0.12em;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.preview-drag-hint svg { width: 12px; height: 12px; stroke: var(--stone-lt); fill: none; stroke-width: 2; flex-shrink: 0; }

/* 업로드 진행 */
.upload-progress { display: none; margin-bottom: 12px; }
.upload-progress.show { display: block; }
.progress-text { font-size: 11px; color: var(--stone); margin-bottom: 6px; }
.progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.3s; width: 0%; }

/* 모달 버튼 */
.modal-actions { display: flex; gap: 12px; margin-top: 8px; }
.btn-save { flex: 1; background: var(--gold); color: var(--dark); border: none; border-radius: var(--radius); padding: 14px; font-family: var(--ff); font-size: 10px; font-weight: 400; letter-spacing: 0.24em; text-transform: uppercase; cursor: pointer; transition: background 0.25s; }
.btn-save:hover { background: var(--gold-lt); }
.btn-save:disabled { background: var(--stone-lt); cursor: not-allowed; }
.btn-cancel { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 24px; font-family: var(--ff); font-size: 10px; color: var(--stone); letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; }
.btn-cancel:hover { border-color: var(--dark); color: var(--dark); }

/* ── 링크 VIEW ── */
.link-view { max-width: 800px; margin: 0 auto; padding: 32px; }
.link-view-title { font-family: var(--serif); font-size: 22px; font-weight: 300; letter-spacing: 0.1em; color: var(--dark); margin-bottom: 28px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 16px; }
.panel-title { font-size: 11px; letter-spacing: 0.26em; color: var(--stone); text-transform: uppercase; font-weight: 400; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.panel-icon { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 1.5; flex-shrink: 0; }
.form-input, .form-select, .form-textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; font-family: var(--ff); font-size: 13px; font-weight: 300; color: var(--dark); background: var(--bg); outline: none; transition: border-color 0.25s; margin-bottom: 14px; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
.form-textarea { resize: none; height: 72px; }
.form-label { display: block; font-size: 10px; letter-spacing: 0.22em; color: var(--stone); text-transform: uppercase; margin-bottom: 8px; }
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.tag-btn { font-size: 10px; letter-spacing: 0.14em; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--stone); cursor: pointer; transition: all 0.2s; font-family: var(--ff); }
.tag-btn.selected { background: var(--dark); color: #fff; border-color: var(--dark); }
.btn-submit { width: 100%; background: var(--gold); color: var(--dark); border: none; border-radius: var(--radius); padding: 13px; font-family: var(--ff); font-size: 10px; font-weight: 400; letter-spacing: 0.24em; text-transform: uppercase; cursor: pointer; transition: background 0.25s; }
.btn-submit:hover { background: var(--gold-lt); }

/* 링크 목록 */
.link-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.link-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.link-item__title { font-size: 13px; font-weight: 400; color: var(--dark); }
.link-item__url { font-size: 11px; color: var(--stone-lt); margin-top: 2px; }
.link-item__tag { font-size: 9px; letter-spacing: 0.14em; padding: 3px 10px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--stone); flex-shrink: 0; }
.link-del { background: none; border: none; cursor: pointer; color: var(--stone-lt); transition: color 0.2s; padding: 4px; }
.link-del:hover { color: var(--red); }
.link-del svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

/* toast */
#toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--dark); color: #F5F4F1; font-size: 12px; letter-spacing: 0.14em; padding: 12px 28px; border-radius: 100px; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 700px) {
  .port-view, .link-view { padding: 16px; }
  .modal-box { padding: 28px 20px; }
  .mf-row { grid-template-columns: 1fr; }
  .project-list { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">DESIGN FOR</div>
    <div class="login-sub">관리자 전용 페이지</div>
    <label class="login-label">비밀번호</label>
    <input class="login-input" type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header class="adm-header">
    <div class="adm-header-logo">DESIGN FOR <span>관리자 대시보드</span></div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="adm-tabs">
    <button class="adm-tab is-on" data-tab="portfolio" onclick="switchTab('portfolio')">포트폴리오 현장</button>
    <button class="adm-tab" data-tab="links" onclick="switchTab('links')">링크 관리</button>
  </div>

  <!-- 포트폴리오 탭 -->
  <div class="adm-view is-on" id="tab-portfolio">
    <div class="port-view">
      <div class="port-view-header">
        <div class="port-view-title">포트폴리오 현장 관리</div>
        <button class="btn-add-project" onclick="openModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          새 현장 추가
        </button>
      </div>
      <div class="project-list" id="project-list"></div>
    </div>
  </div>

  <!-- 링크 탭 -->
  <div class="adm-view" id="tab-links">
    <div class="link-view">
      <div class="link-view-title">링크 관리</div>
      <div class="panel">
        <div class="panel-title">
          <svg class="panel-icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          새 링크 등록
        </div>
        <label class="form-label">링크 제목</label>
        <input class="form-input" id="link-title" type="text" placeholder="예: 인스타그램 포트폴리오">
        <label class="form-label">URL</label>
        <input class="form-input" id="link-url" type="url" placeholder="https://instagram.com/...">
        <label class="form-label">카테고리</label>
        <div class="tag-row" id="link-tags">
          <button class="tag-btn selected" data-tag="인스타그램">인스타그램</button>
          <button class="tag-btn" data-tag="블로그">블로그</button>
          <button class="tag-btn" data-tag="유튜브">유튜브</button>
          <button class="tag-btn" data-tag="기타">기타</button>
        </div>
        <label class="form-label">메모 (선택)</label>
        <textarea class="form-textarea" id="link-memo" placeholder="간단한 설명"></textarea>
        <button class="btn-submit" onclick="addLink()">링크 등록하기</button>
        <div class="link-list" id="link-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- 현장 등록/수정 MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">새 현장 추가</div>

    <!-- 기본 정보 -->
    <div class="mf-section">기본 정보</div>
    <div class="mf-row">
      <div class="mf-group">
        <label class="mf-label">현장명 *</label>
        <input class="mf-input" id="mf-sitename" type="text" placeholder="예: 판교 TH212">
      </div>
      <div class="mf-group">
        <label class="mf-label">평수</label>
        <input class="mf-input" id="mf-area" type="text" placeholder="예: 43py">
      </div>
    </div>
    <div class="mf-row">
      <div class="mf-group">
        <label class="mf-label">위치</label>
        <input class="mf-input" id="mf-location" type="text" placeholder="예: 경기도 성남시 판교">
      </div>
      <div class="mf-group">
        <label class="mf-label">유형</label>
        <select class="mf-select" id="mf-type">
          <option value="">선택</option>
          <option>아파트</option>
          <option>주택</option>
          <option>상업공간</option>
          <option>오피스</option>
          <option>기타</option>
        </select>
      </div>
    </div>
    <div class="mf-group">
      <label class="mf-label">시작일 ~ 완료일</label>
      <input class="mf-input" id="mf-period" type="text" placeholder="예: 2024.03.01 ~ 2024.06.30">
    </div>

    <!-- 대표 이미지 -->
    <div class="mf-section">대표 이미지 (썸네일용 1장)</div>
    <div class="preview-strip" id="cover-preview"></div>
    <div class="drop-zone" id="cover-drop">
      <input type="file" id="cover-file" accept="image/*" onchange="onCoverSelect(event)">
      <svg class="drop-zone__icon" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      <div class="drop-zone__text"><strong>클릭하여 대표 이미지 선택</strong><br>목록 화면 썸네일로 사용됩니다</div>
    </div>

    <!-- 상세 이미지 -->
    <div class="mf-section">상세 이미지 (여러 장)</div>
    <div class="preview-drag-hint" id="detail-drag-hint" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
      드래그로 순서 변경 · ✕ 버튼으로 삭제
    </div>
    <div class="preview-strip" id="detail-preview"></div>
    <div class="drop-zone" id="detail-drop">
      <input type="file" id="detail-files" accept="image/*" multiple onchange="onDetailSelect(event)">
      <svg class="drop-zone__icon" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      <div class="drop-zone__text"><strong>클릭하거나 끌어다 놓기</strong><br>JPG, PNG, WEBP · 여러 장 가능</div>
    </div>

    <!-- 업로드 진행 -->
    <div class="upload-progress" id="upload-prog">
      <div class="progress-text" id="prog-text">업로드 중...</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar"></div></div>
    </div>

    <div class="modal-actions">
      <button class="btn-save" id="btn-save" onclick="saveProject()">저장하기</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* =========================================
   CONFIG
   ========================================= */
const PASS          = '1212';
const CLOUD_NAME    = 'dirocerek';
const UPLOAD_PRESET = 'designfor_upload';
const PROJECTS_KEY  = 'df_projects_v1';
const LINKS_KEY     = 'df_links_v1';

/* =========================================
   STATE
   ========================================= */
let editingId    = null;   // 수정 중인 현장 id (null = 신규)
let pendingCover = null;   // File 객체 (대표 이미지)
let detailItems  = [];     // { src: string, file: File|null } 배열 (상세 이미지)
let existingCover  = '';   // 기존 URL (수정 시)
let existingDetails = [];  // 기존 URL 배열 (수정 시, 참조용)

/* =========================================
   AUTH
   ========================================= */
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').classList.add('show');
    renderProjectList();
    renderLinkList();
  } else {
    document.getElementById('login-error').textContent = '비밀번호가 맞지 않습니다.';
    document.getElementById('pw-input').value = '';
  }
}
function doLogout() {
  document.getElementById('admin-screen').classList.remove('show');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').textContent = '';
}

/* =========================================
   TABS
   ========================================= */
function switchTab(name) {
  document.querySelectorAll('.adm-tab').forEach(t => t.classList.toggle('is-on', t.dataset.tab === name));
  document.querySelectorAll('.adm-view').forEach(v => v.classList.toggle('is-on', v.id === `tab-${name}`));
}

/* =========================================
   PROJECT CRUD
   ========================================= */
function loadProjects() {
  try { return JSON.parse(localStorage.getItem(PROJECTS_KEY) || '[]'); } catch(e) { return []; }
}
function saveProjects(arr) {
  localStorage.setItem(PROJECTS_KEY, JSON.stringify(arr));
}

function renderProjectList() {
  const projects = loadProjects();
  const el = document.getElementById('project-list');
  if (!projects.length) {
    el.innerHTML = `<div class="empty-projects" style="grid-column:1/-1;">등록된 현장이 없습니다.<br>"새 현장 추가" 버튼으로 시작해 주세요.</div>`;
    return;
  }
  el.innerHTML = projects.map(p => `
    <div class="project-card">
      <div class="project-card__cover">
        ${p.coverImage
          ? `<img src="${esc(p.coverImage)}" alt="${esc(p.siteName)}" loading="lazy">`
          : `<div class="project-card__cover-empty">대표 이미지 없음</div>`}
      </div>
      <div class="project-card__body">
        <div class="project-card__name">${esc(p.siteName)}</div>
        <div class="project-card__meta">
          ${p.area ? p.area + ' &nbsp;·&nbsp; ' : ''}${p.type || ''}${p.location ? '<br>' + p.location : ''}
          ${p.images && p.images.length ? `<br>상세 이미지 ${p.images.length}장` : ''}
        </div>
      </div>
      <div class="project-card__actions">
        <button class="btn-edit" onclick="openModal('${esc(p.id)}')">수정</button>
        <button class="btn-del-project" onclick="deleteProject('${esc(p.id)}')">삭제</button>
      </div>
    </div>
  `).join('');
}

function deleteProject(id) {
  if (!confirm('이 현장을 삭제하시겠습니까?')) return;
  const arr = loadProjects().filter(p => p.id !== id);
  saveProjects(arr);
  renderProjectList();
  showToast('삭제되었습니다.');
}

/* =========================================
   MODAL 열기 / 닫기
   ========================================= */
function openModal(id) {
  editingId      = id || null;
  pendingCover   = null;
  detailItems    = [];   // ← pendingDetails 대신 detailItems 사용
  existingCover  = '';
  existingDetails = [];

  // 폼 초기화
  ['mf-sitename','mf-area','mf-location','mf-period'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('mf-type').value = '';
  document.getElementById('cover-preview').innerHTML  = '';
  document.getElementById('detail-preview').innerHTML = '';
  document.getElementById('detail-drag-hint').style.display = 'none';
  document.getElementById('cover-file').value  = '';
  document.getElementById('detail-files').value = '';

  if (id) {
    const p = loadProjects().find(x => x.id === id);
    if (!p) return;
    document.getElementById('modal-title').textContent = '현장 수정';
    document.getElementById('mf-sitename').value = p.siteName  || '';
    document.getElementById('mf-area').value     = p.area      || '';
    document.getElementById('mf-location').value = p.location  || '';
    document.getElementById('mf-period').value   = p.period    || '';
    document.getElementById('mf-type').value     = p.type      || '';

    existingCover   = p.coverImage || '';
    existingDetails = p.images     || [];

    if (existingCover) renderCoverPreview(existingCover);
    // 기존 상세 이미지를 detailItems로 로드
    if (existingDetails.length) loadExistingDetailImages(existingDetails);
  } else {
    document.getElementById('modal-title').textContent = '새 현장 추가';
  }

  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
// 오버레이 클릭으로 닫기
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

/* =========================================
   FILE SELECT + 미리보기 (삭제 · 순서 변경)
   ========================================= */

// 상세 이미지 데이터: { src: dataURL or cloudURL, file: File|null }
let detailItems = [];   // pendingDetails 대신 이 배열 사용

function onCoverSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  pendingCover = file;
  const reader = new FileReader();
  reader.onload = ev => renderCoverPreview(ev.target.result);
  reader.readAsDataURL(file);
}

function renderCoverPreview(src) {
  const el = document.getElementById('cover-preview');
  el.innerHTML = `
    <div class="preview-thumb-wrap is-cover">
      <img class="preview-thumb" src="${src}">
      <div class="preview-cover-badge">대표</div>
      <button class="preview-remove" onclick="removeCover()" title="삭제">✕</button>
    </div>`;
}

function removeCover() {
  pendingCover  = null;
  existingCover = '';
  document.getElementById('cover-preview').innerHTML = '';
  document.getElementById('cover-file').value = '';
}

/* 상세 이미지 선택 */
function onDetailSelect(e) {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
  addDetailFiles(files);
  e.target.value = '';
}

function addDetailFiles(files) {
  files.forEach(f => {
    const item = { src: null, file: f };
    detailItems.push(item);
    const idx = detailItems.length - 1;
    const reader = new FileReader();
    reader.onload = ev => {
      detailItems[idx].src = ev.target.result;
      renderDetailPreview();
    };
    reader.readAsDataURL(f);
  });
}

/* 기존 URL 이미지 (수정 모드) */
function loadExistingDetailImages(urls) {
  detailItems = urls.map(url => ({ src: url, file: null }));
  renderDetailPreview();
}

/* 렌더링 */
function renderDetailPreview() {
  const el    = document.getElementById('detail-preview');
  const hint  = document.getElementById('detail-drag-hint');
  hint.style.display = detailItems.length ? 'flex' : 'none';

  el.innerHTML = detailItems.map((item, i) => `
    <div class="preview-thumb-wrap"
         draggable="true"
         data-idx="${i}"
         ondragstart="onDragStart(event,${i})"
         ondragover="onDragOver(event,${i})"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event,${i})"
         ondragend="onDragEnd(event)">
      <img class="preview-thumb" src="${item.src || ''}" alt="이미지 ${i+1}">
      <div class="preview-order-num">${i + 1}</div>
      <button class="preview-remove" onclick="removeDetailItem(${i})" title="삭제">✕</button>
    </div>
  `).join('');
}

function removeDetailItem(idx) {
  detailItems.splice(idx, 1);
  renderDetailPreview();
}

/* ── 드래그 & 드롭 순서 변경 ── */
let dragSrcIdx = null;

function onDragStart(e, idx) {
  dragSrcIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`[data-idx="${idx}"]`);
    if (el) el.classList.add('is-dragging');
  }, 0);
}

function onDragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (idx === dragSrcIdx) return;
  document.querySelectorAll('.preview-thumb-wrap').forEach(el => el.classList.remove('drag-over-target'));
  const el = document.querySelector(`[data-idx="${idx}"]`);
  if (el) el.classList.add('drag-over-target');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-target');
}

function onDrop(e, targetIdx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  // 배열 순서 변경
  const moved = detailItems.splice(dragSrcIdx, 1)[0];
  detailItems.splice(targetIdx, 0, moved);
  dragSrcIdx = null;
  renderDetailPreview();
}

function onDragEnd(e) {
  dragSrcIdx = null;
  document.querySelectorAll('.preview-thumb-wrap').forEach(el => {
    el.classList.remove('is-dragging', 'drag-over-target');
  });
}

/* 드롭존 파일 드롭 (업로드 박스로 드롭) */
const detailDrop = document.getElementById('detail-drop');
detailDrop.addEventListener('dragover', e => {
  // 파일 드롭인지 썸네일 이동인지 구분
  if (dragSrcIdx !== null) return;
  e.preventDefault(); detailDrop.classList.add('drag-over');
});
detailDrop.addEventListener('dragleave', () => detailDrop.classList.remove('drag-over'));
detailDrop.addEventListener('drop', e => {
  if (dragSrcIdx !== null) return;
  e.preventDefault(); detailDrop.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) addDetailFiles(files);
});

/* =========================================
   SAVE PROJECT — 병렬 업로드 + 압축
   ========================================= */
const PARALLEL = 4;       // 동시 업로드 수
const MAX_PX   = 1920;    // 최대 가로/세로 픽셀
const QUALITY  = 0.82;    // JPEG 품질 (0~1)

async function saveProject() {
  const siteName = document.getElementById('mf-sitename').value.trim();
  if (!siteName) { showToast('현장명을 입력해 주세요.'); return; }

  const btn  = document.getElementById('btn-save');
  const prog = document.getElementById('upload-prog');
  const bar  = document.getElementById('prog-bar');
  const txt  = document.getElementById('prog-text');

  btn.disabled = true;
  prog.classList.add('show');
  bar.style.width = '0%';

  let coverUrl = existingCover;

  // detailItems 중 file이 있는 것만 업로드, URL인 것은 그대로 유지
  const newFileItems  = detailItems.filter(d => d.file !== null);
  const existUrlItems = detailItems.filter(d => d.file === null);

  // 전체 업로드 대상 (커버 + 새 파일들)
  const uploadQueue = [];
  if (pendingCover) uploadQueue.push({ file: pendingCover, role: 'cover' });
  newFileItems.forEach((d, i) => uploadQueue.push({ file: d.file, role: 'detail', detailIdx: i }));

  const total = uploadQueue.length;
  let done = 0;

  const updateBar = () => {
    done++;
    const pct = Math.round((done / Math.max(total, 1)) * 100);
    bar.style.width = pct + '%';
    txt.textContent = total > 0 ? `업로드 중... ${done} / ${total} (${pct}%)` : '저장 중...';
  };

  // 병렬 업로드 결과
  const uploadResults = new Array(uploadQueue.length).fill(null);

  for (let i = 0; i < uploadQueue.length; i += PARALLEL) {
    const chunk = uploadQueue.slice(i, i + PARALLEL);
    await Promise.all(chunk.map(async (item, j) => {
      const gi = i + j;
      try {
        const compressed = await compressImage(item.file);
        uploadResults[gi] = { role: item.role, detailIdx: item.detailIdx, url: await uploadToCloudinary(compressed) };
      } catch(e) {
        uploadResults[gi] = { role: item.role, detailIdx: item.detailIdx, url: null };
        showToast(`${item.file.name} 업로드 실패`);
      }
      updateBar();
    }));
  }

  // 커버 URL 업데이트
  const coverResult = uploadResults.find(r => r && r.role === 'cover');
  if (coverResult?.url) coverUrl = coverResult.url;

  // 상세 이미지: detailItems 순서 유지하면서 URL 교체
  let newFileUploadedUrls = [];
  uploadResults.filter(r => r && r.role === 'detail' && r.url).forEach(r => {
    newFileUploadedUrls.push(r.url);
  });

  // detailItems 순서대로 URL 배열 구성
  let newFileIdx = 0;
  const finalDetailUrls = detailItems.map(d => {
    if (d.file === null) return d.src;   // 기존 URL 그대로
    return newFileUploadedUrls[newFileIdx++] || null;  // 새로 업로드된 URL
  }).filter(Boolean);

  bar.style.width = '100%';
  txt.textContent = '저장 완료!';

  const projects = loadProjects();
  const newProject = {
    id:         editingId || uid(),
    siteName:   document.getElementById('mf-sitename').value.trim(),
    area:       document.getElementById('mf-area').value.trim(),
    location:   document.getElementById('mf-location').value.trim(),
    period:     document.getElementById('mf-period').value.trim(),
    type:       document.getElementById('mf-type').value,
    coverImage: coverUrl,
    images:     finalDetailUrls,
    updatedAt:  Date.now(),
    createdAt:  editingId ? (projects.find(p => p.id === editingId)?.createdAt || Date.now()) : Date.now(),
  };

  if (editingId) {
    const idx = projects.findIndex(p => p.id === editingId);
    if (idx >= 0) projects[idx] = newProject; else projects.unshift(newProject);
  } else {
    projects.unshift(newProject);
  }

  saveProjects(projects);
  renderProjectList();
  closeModal();
  showToast(editingId ? '현장이 수정되었습니다. ✓' : `현장 등록 완료! (이미지 ${total}장) ✓`);
  setTimeout(() => { prog.classList.remove('show'); bar.style.width = '0%'; btn.disabled = false; }, 1000);
}

/* =========================================
   이미지 압축 — Canvas 리사이즈
   ========================================= */
function compressImage(file) {
  return new Promise((resolve) => {
    // 이미 작은 파일은 그냥 통과
    if (file.size < 300 * 1024) { resolve(file); return; }

    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;

      // 비율 유지하며 축소
      if (width > MAX_PX || height > MAX_PX) {
        if (width > height) { height = Math.round(height * MAX_PX / width); width = MAX_PX; }
        else                { width  = Math.round(width  * MAX_PX / height); height = MAX_PX; }
      }

      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);

      canvas.toBlob(blob => {
        resolve(blob || file);
      }, 'image/jpeg', QUALITY);
    };
    img.onerror = () => resolve(file);
    img.src = url;
  });
}

/* =========================================
   CLOUDINARY 업로드
   ========================================= */
async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  fd.append('folder', 'designfor_portfolio');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || '실패'); }
  const data = await res.json();
  return data.secure_url;
}

/* =========================================
   LINKS
   ========================================= */
function loadLinks() { try { return JSON.parse(localStorage.getItem(LINKS_KEY)||'[]'); } catch(e){return[];} }
function saveLinks(arr) { localStorage.setItem(LINKS_KEY, JSON.stringify(arr)); }

document.getElementById('link-tags').addEventListener('click', e => {
  const btn = e.target.closest('.tag-btn'); if(!btn) return;
  document.querySelectorAll('#link-tags .tag-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
});

function addLink() {
  const title = document.getElementById('link-title').value.trim();
  let   url   = document.getElementById('link-url').value.trim();
  const memo  = document.getElementById('link-memo').value.trim();
  const tag   = document.querySelector('#link-tags .tag-btn.selected')?.dataset.tag || '';
  if (!title) { showToast('링크 제목을 입력해주세요.'); return; }
  if (!url)   { showToast('URL을 입력해주세요.'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  const links = loadLinks();
  links.unshift({ id:uid(), title, url, memo, tag, createdAt:Date.now() });
  saveLinks(links);
  renderLinkList();
  showToast('링크가 등록되었습니다.');
  ['link-title','link-url','link-memo'].forEach(id => document.getElementById(id).value='');
}

function deleteLink(id) {
  saveLinks(loadLinks().filter(l=>l.id!==id));
  renderLinkList();
  showToast('삭제되었습니다.');
}

function renderLinkList() {
  const links = loadLinks();
  const el = document.getElementById('link-list');
  if (!links.length) { el.innerHTML=''; return; }
  el.innerHTML = links.map(l=>`
    <div class="link-item">
      <div style="flex:1;min-width:0;">
        <div class="link-item__title">${esc(l.title)}</div>
        <div class="link-item__url">${esc(l.url)}</div>
      </div>
      <span class="link-item__tag">${esc(l.tag)}</span>
      <button class="link-del" onclick="deleteLink('${esc(l.id)}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  `).join('');
}

/* =========================================
   TOAST / UTILS
   ========================================= */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}
function uid() { return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
